spring.application.name=cinepass

#cau hinh sql bang tai khoan sa
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=cinepass;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

#cau hinh JPA/hibernate tu dong
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=never
server.port=8080

# ===== JWT =====
# QUAN TRONG: doi secret nay khi deploy that (vd truyen qua bien moi truong JWT_SECRET).
# Secret phai >= 32 ky tu (256 bit) vi dang dung thuat toan HS256.

app.jwt.secret=${JWT_SECRET:cinepass-dev-only-secret-key-change-me-before-production-2026}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===== CORS =====
# Danh sach origin duoc phep goi API, phan cach boi dau phay. "*" chi nen dung cho moi truong dev.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# ===== Tai khoan admin mac dinh (chi tao khi chua co admin nao trong DB) =====
app.admin.default-username=${ADMIN_USERNAME:admin}
app.admin.default-password=${ADMIN_PASSWORD:Admin@123}