spring.application.name=cinepass

#cau hinh sql bang tai khoan sa
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=cinepass;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

#cau hinh JPA/hibernate tu dong
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=never
server.port=8080
